name: GBP Reviews History -> Make
 
on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 5 * * 1" # jeden Montag 05:00 UTC (= 06:00/07:00 Berlin)
 
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
 
      - name: Install deps
        run: npm install
 
      - name: Run history job
        run: npm run gbp:history
        env:
          GBP_CLIENT_ID:           ${{ secrets.GBP_CLIENT_ID }}
          GBP_CLIENT_SECRET:       ${{ secrets.GBP_CLIENT_SECRET }}
          GBP_REFRESH_TOKEN:       ${{ secrets.GBP_REFRESH_TOKEN }}
          GBP_ACCOUNT_ID:          ${{ secrets.GBP_ACCOUNT_ID }}
          MAKE_REVIEWS_WEBHOOK_URL_MONTHLY: ${{ secrets.MAKE_REVIEWS_WEBHOOK_URL_MONTHLY }}
          CONCURRENCY:             "3"
 
      - name: Upload CSV artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gbp-reviews-csv
          path: "gbp-reviews-*.csv"
          retention-days: 30
 
